name: 🐛 Bug Report
description: Report a bug or unexpected behavior in prisma-extension-redis
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible to help us reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of prisma-extension-redis are you using?
      placeholder: e.g., 3.1.0
    validations:
      required: true

  - type: input
    id: prisma-version
    attributes:
      label: Prisma Version
      description: What version of Prisma are you using?
      placeholder: e.g., 5.7.0
    validations:
      required: true

  - type: input
    id: redis-version
    attributes:
      label: Redis/Dragonfly Version
      description: What version of Redis or Dragonfly are you using?
      placeholder: e.g., Redis 7.2.0 or Dragonfly 6.2.0
    validations:
      required: true

  - type: dropdown
    id: cache-type
    attributes:
      label: Cache Type
      description: What cache type are you using?
      options:
        - JSON
        - STRING
    validations:
      required: true

  - type: dropdown
    id: operation-type
    attributes:
      label: Operation Type
      description: What type of operation was affected?
      options:
        - Auto-caching (findUnique, findMany, etc.)
        - Manual caching with cache options
        - Cache invalidation (uncache)
        - Key generation (getKey, getKeyPattern)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Set up prisma-extension-redis with configuration X
        2. Execute query Y with cache options Z
        3. Observe the error/issue
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happened
    validations:
      required: true

  - type: textarea
    id: code-example
    attributes:
      label: Code Example
      description: Please provide a minimal code example that reproduces the issue
      placeholder: |
        ```typescript
        // Your code here
        const extendedPrisma = prisma.$extends(
          PrismaExtensionRedis({ config, client })
        );
        ```
      render: typescript
    validations:
      required: true

  - type: textarea
    id: configuration
    attributes:
      label: Configuration
      description: Please share your cache configuration (remove sensitive information)
      placeholder: |
        ```typescript
        const config: CacheConfig = {
          // Your config here
        };
        ```
      render: typescript

  - type: textarea
    id: error-message
    attributes:
      label: Error Message
      description: If applicable, paste the full error message here
      placeholder: |
        ```
        Error: ...
        ```

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please provide details about your environment
      placeholder: |
        - OS: [e.g., Ubuntu 22.04, macOS 13.0, Windows 11]
        - Node.js version: [e.g., 18.17.0]
        - Package manager: [e.g., npm, yarn, pnpm, bun]
        - Database: [e.g., PostgreSQL, MySQL, SQLite]
        - Redis/Dragonfly setup: [e.g., Local, Docker, Cloud provider]

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true

  - type: markdown
    attributes:
      value: |
        ## Additional Context
        Add any other context about the problem here.
