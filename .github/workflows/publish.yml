name: publish

on:
  push:
    branches:
      - main
      - next
      - beta
      - alpha

permissions:
  contents: read

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Set Up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Project Dependencies
        run: bun install

      - name: Build the package
        run: bun run build

      - name: Prepare GitHub Packages build
        run: |
          mkdir -p build-github
          cp -r dist build-github/
          cp CHANGELOG.md LICENSE README.md build-github/
          # Create scoped package.json for GitHub Packages
          sed 's/"name": "prisma-extension-redis"/"name": "@yxx4c\/prisma-extension-redis"/' package.json > build-github/package.json
          # Remove devDependencies and scripts from GitHub package.json
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('build-github/package.json', 'utf8'));
            delete pkg.devDependencies;
            delete pkg.scripts;
            require('fs').writeFileSync('build-github/package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Create Distribution Archive
        run: |
          zip -r build.zip dist package.json README.md LICENSE CHANGELOG.md
          tar -czvf build.tar.gz dist package.json README.md LICENSE CHANGELOG.md

      - name: Publish Package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_NPM_CONFIG_REGISTRY: https://npm.pkg.github.com/
          GITHUB_NPM_TOKEN: ${{ secrets.GH_NPM_TOKEN }}
          PUBLIC_NPM_CONFIG_REGISTRY: https://registry.npmjs.org
          PUBLIC_NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run release
